name: CI

on:
  push:
    branches: [main]
    tags: ['deploy']
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  # On main/deploy the same commit can fire twice (push + deploy tag) — group by
  # SHA so the later trigger cancels the earlier. PRs group by ref to save minutes.
  group: >-
    ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/tags/deploy')
        && format('ci-commit-{0}', github.sha)
        || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  # ─── PR validation: typecheck + lint + unit tests (node only) ───
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Lint
        run: npx @biomejs/biome check src/ tests/
      - name: Unit tests
        run: npm test

  # ─── Version + build + push to ghcr.io (main pushes + deploy tag) ───
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.fullSemVer }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion needs full history

      # Dedicated version step — computes the tag and passes it into the build.
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Compute image tag (docker-safe)
        id: meta
        run: |
          # '+' is illegal in a docker tag — FullSemVer uses it for build metadata.
          echo "tag=${GITVERSION_FULLSEMVER//+/-}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck + lint + test
        run: |
          npm run check
          npx @biomejs/biome check src/ tests/
          npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            APP_VERSION=${{ steps.gitversion.outputs.fullSemVer }}
            GIT_SHORT_SHA=${{ steps.gitversion.outputs.shortSha }}
            GIT_COMMIT_DATE=${{ steps.gitversion.outputs.commitDate }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy via SSH (only on manual `deploy` tag push) ───
  # The app reads ALL config + secrets from PetBox, so the server only needs the
  # PetBox bootstrap key — no Twitter/proxy secrets on the host.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.tag }}
          PETBOX_API_KEY: ${{ secrets.PETBOX_API_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: IMAGE,PETBOX_API_KEY
          script: |
            set -euo pipefail
            docker pull "$IMAGE"
            docker rm -f kpvotes || true
            docker run -d --name kpvotes --restart unless-stopped \
              -e PETBOX_ENDPOINT="https://petbox.3po.su" \
              -e PETBOX_API_KEY="$PETBOX_API_KEY" \
              -e PETBOX_DATA_DB="kpvotes-cache" \
              "$IMAGE"
            docker image prune -f
